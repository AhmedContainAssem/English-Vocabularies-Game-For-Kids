<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 1 - Lesson 1: Our Senses</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            width: 100%;
            max-width: 650px;
            background: #1e293b;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #334155;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #38bdf8;
            font-size: 1.6rem;
            margin: 0 0 10px 0;
        }

        .header p {
            color: #94a3b8;
            margin: 0;
            font-size: 0.95rem;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            background: #0f172a;
            padding: 10px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #f59e0b;
        }

        .question-card {
            background: #334155;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .emoji-display {
            font-size: 3.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .question-text {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #ffffff;
            line-height: 1.5;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background: #1e293b;
            color: #f8fafc;
            border: 2px solid #475569;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            direction: ltr;
        }

        .option-btn:hover {
            border-color: #38bdf8;
            background: #0f172a;
        }

        .option-btn.correct {
            background: #15803d !important;
            border-color: #22c55e !important;
            color: white;
        }

        .option-btn.wrong {
            background: #b91c1c !important;
            border-color: #ef4444 !important;
            color: white;
        }

        .feedback {
            margin-top: 15px;
            font-size: 1.05rem;
            font-weight: bold;
            min-height: 30px;
            text-align: center;
        }

        .feedback.success { color: #4ade80; }
        .feedback.error { color: #f87171; }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .back-btn {
            background: #475569;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .next-btn {
            background: #0284c7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h1 id="title">Unit 1 - Lesson 1</h1>
            <p id="description">الحواس والكلمات الأساسية (Our Senses)</p>
        </div>

        <div class="score-board">
            <span>السؤال: <span id="current-q">1</span> / <span id="total-q">19</span></span>
            <span>النقاط: <span id="score">0</span> 🌟</span>
        </div>

        <div class="question-card">
            <span class="emoji-display" id="emoji">🍦👅</span>
            <div class="question-text" id="question">جاري تحميل السؤال...</div>
            <div class="options-grid" id="options"></div>
            <div class="feedback" id="feedback"></div>
        </div>

        <div class="nav-controls">
            <a href="../index.html" class="back-btn">⬅ العودة للرئيسية</a>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">السؤال التالي ➔</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 📌 بيانات الدرس الأول كاملة
        // ==========================================
        const lessonData = {
            title: "Unit 1 - Lesson 1: Our Senses 👁️👂",
            description: "اختبر معلوماتك في حواس الإنسان والكلمات الأساسية والأفعال!",
            sections: [
                {
                    title: "✨ الحواس والكلمات الأساسية",
                    questions: [
                        {
                            id: "q1", emoji: "🍦👅",
                            question: "We taste with our tongue. ما اسم حاسة التذوق؟",
                            options: [
                                { text: "Touch", isCorrect: false },
                                { text: "Taste", isCorrect: true },
                                { text: "Smell", isCorrect: false }
                            ],
                            correctMsg: "أحسنت! 👅 Taste تعني التذوق (+10)", wrongMsg: "حاول مجدداً!"
                        },
                        {
                            id: "q2", emoji: "🌵✋",
                            question: "We touch with our hands. ما اسم حاسة اللمس؟",
                            options: [
                                { text: "Touch", isCorrect: true },
                                { text: "Sight", isCorrect: false },
                                { text: "Hearing", isCorrect: false }
                            ],
                            correctMsg: "ممتاز! ✋ Touch تعني اللمس (+10)", wrongMsg: "ركز في اليد!"
                        },
                        {
                            id: "q3", emoji: "👂🎶",
                            question: "We hear with our ears. ما اسم حاسة السمع؟",
                            options: [
                                { text: "Taste", isCorrect: false },
                                { text: "Smell", isCorrect: false },
                                { text: "Hearing", isCorrect: true }
                            ],
                            correctMsg: "بطل! 👂 Hearing تعني السمع (+10)", wrongMsg: "الأذن للسمع!"
                        },
                        {
                            id: "q4", emoji: "👁️🔍",
                            question: "We see with our eyes. ما اسم حاسة الإبصار؟",
                            options: [
                                { text: "Sight", isCorrect: true },
                                { text: "Touch", isCorrect: false },
                                { text: "Taste", isCorrect: false }
                            ],
                            correctMsg: "رائع! 👁️ Sight تعني الرؤية (+10)", wrongMsg: "العين للرؤية!"
                        },
                        {
                            id: "q5", emoji: "👃🌸",
                            question: "We smell with our nose. ما اسم حاسة الشم؟",
                            options: [
                                { text: "Hearing", isCorrect: false },
                                { text: "Smell", isCorrect: true },
                                { text: "Sight", isCorrect: false }
                            ],
                            correctMsg: "عبقري! 👃 Smell تعني الشم (+10)", wrongMsg: "الأنف مخصص للشم!"
                        },
                        {
                            id: "q6", emoji: "👅🍕",
                            question: "ما اسم العضو (لسان) والطعام الـ (لذيذ)؟",
                            options: [
                                { text: "tongue / delicious", isCorrect: true },
                                { text: "fire / smoke", isCorrect: false },
                                { text: "amazing / voices", isCorrect: false }
                            ],
                            correctMsg: "صحيح! 👅 tongue و delicious 😋 (+10)", wrongMsg: "ابحث عن اللسان والطعام الشَهي!"
                        },
                        {
                            id: "q7", emoji: "🔥💨",
                            question: "ماذا نرى عند حدوث حريق؟ (حريق / دخان)",
                            options: [
                                { text: "tongue / delicious", isCorrect: false },
                                { text: "fire / smoke", isCorrect: true },
                                { text: "amazing / voices", isCorrect: false }
                            ],
                            correctMsg: "صحيح! 🔥 fire و smoke 💨 (+10)", wrongMsg: "ابحث عن النار والدخان!"
                        },
                        {
                            id: "q8", emoji: "🗣️⭐",
                            question: "نستمع إلى أصوات بشرية رائعة ومذهلة:",
                            options: [
                                { text: "fire / smoke", isCorrect: false },
                                { text: "tongue / delicious", isCorrect: false },
                                { text: "amazing / voices", isCorrect: true }
                            ],
                            correctMsg: "مبدع! 🗣️ amazing تعني رائع و voices أصوات (+10)", wrongMsg: "فكر في الأصوات المذهلة!"
                        },
                        {
                            id: "q9", emoji: "🧑‍🎓🏫",
                            question: "أين يدرس الطلاب (students)؟ في حجرة الدراسة:",
                            options: [
                                { text: "students / classroom", isCorrect: true },
                                { text: "birds singing / world", isCorrect: false },
                                { text: "hard / soft", isCorrect: false }
                            ],
                            correctMsg: "أحسنت! 🏫 طلاب وفصل دراسي (+10)", wrongMsg: "جرب مجدداً!"
                        },
                        {
                            id: "q10", emoji: "🦋🏡",
                            question: "نرى فراشات (butterflies) في حديقة المدرسة الـ (beautiful):",
                            options: [
                                { text: "loud noise / situations", isCorrect: false },
                                { text: "beautiful / school garden / butterflies", isCorrect: true },
                                { text: "excellent / great / huge", isCorrect: false }
                            ],
                            correctMsg: "بطل! 🦋 حديقة وفراشات جميلة (+10)", wrongMsg: "ابحث عن الفراشات والحديقة!"
                        },
                        {
                            id: "q11", emoji: "🎵🔊",
                            question: "سماع موسيقى صاخبة جداً يسبب ضوضاء صاخبة:",
                            options: [
                                { text: "music / loud noise", isCorrect: true },
                                { text: "soft / colorful", isCorrect: false },
                                { text: "shapes / world", isCorrect: false }
                            ],
                            correctMsg: "ممتاز! 🔊 موسيقى وضوضاء صاخبة (+10)", wrongMsg: "فكر في الصوت العالي!"
                        },
                        {
                            id: "q12", emoji: "🧸🪨",
                            question: "الدمية ناعمة اللين بينما الحجر صلب خشن:",
                            options: [
                                { text: "excellent / great", isCorrect: false },
                                { text: "soft / hard", isCorrect: true },
                                { text: "colorful / shapes", isCorrect: false }
                            ],
                            correctMsg: "رائع! 🧸 soft ناعم و hard صلب (+10)", wrongMsg: "فكر في الملمس!"
                        },
                        {
                            id: "q13", emoji: "🎨📐",
                            question: "المثلث والمربع هي أشكال هندسية ملونة:",
                            options: [
                                { text: "colorful / shapes", isCorrect: true },
                                { text: "situations / world", isCorrect: false },
                                { text: "students / classroom", isCorrect: false }
                            ],
                            correctMsg: "أحسنت! 🎨 أشكال ملونة (+10)", wrongMsg: "ابحث عن الألوان والأشكال!"
                        },
                        {
                            id: "q14", emoji: "👶🐦🌍",
                            question: "الأطفال يستمعون لغناء الطيور في هذا العالم الجميل:",
                            options: [
                                { text: "soft / hard / classroom", isCorrect: false },
                                { text: "huge / excellent / great", isCorrect: false },
                                { text: "children / birds singing / world", isCorrect: true }
                            ],
                            correctMsg: "مذهل! 🌍 الأطفال، غناء الطيور، والعالم (+10)", wrongMsg: "فكر في الطبيعة والأطفال!"
                        },
                        {
                            id: "q15", emoji: "🐘⭐",
                            question: "هذا الفيل ضخم للغاية، وذكاؤه ممتاز وعظيم:",
                            options: [
                                { text: "excellent / great / huge", isCorrect: true },
                                { text: "soft / hard / music", isCorrect: false },
                                { text: "students / classroom", isCorrect: false }
                            ],
                            correctMsg: "أنت ممتاز! 🐘 ضخم، عظيم، وممتاز (+10)", wrongMsg: "ابحث عن كلمات الضخامة والتميز!"
                        },
                        {
                            id: "q16", emoji: "🤝💼",
                            question: "نتعرض في حياتنا اليومية إلى مواقف مختلفة:",
                            options: [
                                { text: "butterflies", isCorrect: false },
                                { text: "situations", isCorrect: true },
                                { text: "classroom", isCorrect: false }
                            ],
                            correctMsg: "بالتأكيد! 🤝 situations تعني مواقف (+10)", wrongMsg: "الكلمة تعني مواقف حياتية."
                        },
                        {
                            id: "q17", emoji: "📈",
                            question: "ما هي الأفعال المنتظمة (Regular Verbs) في المضارع والماضي؟",
                            options: [
                                { text: "use ➔ used / taste ➔ tasted / touch ➔ touched / try ➔ tried", isCorrect: true },
                                { text: "hear ➔ heard / find ➔ found / sing ➔ sang / understand ➔ understood", isCorrect: false }
                            ],
                            correctMsg: "صحيح! أفعال منتظمة تنتهي بـ ed (+10)", wrongMsg: "هذه أفعال غير منتظمة!"
                        },
                        {
                            id: "q18", emoji: "🧠",
                            question: "ما هي الأفعال غير المنتظمة (Irregular Verbs) الشاذة؟",
                            options: [
                                { text: "use ➔ used / taste ➔ tasted / touch ➔ touched / try ➔ tried", isCorrect: false },
                                { text: "hear ➔ heard / find ➔ found / sing ➔ sang / understand ➔ understood", isCorrect: true }
                            ],
                            correctMsg: "ممتاز! أفعال شاذة يتغير شكلها في الماضي (+10)", wrongMsg: "هذه المجموعة تأخذ ed منتظمة!"
                        },
                        {
                            id: "q19", emoji: "💬✨",
                            question: "ما هي التعبيرات الهامة: (يتعلم عن / يبقى آمناً / يا له من يوم جميل / يتحدث عن)؟",
                            options: [
                                { text: "learn about / stay safe / What a beautiful day! / talk about", isCorrect: true },
                                { text: "senses / hearing / smoke / fire", isCorrect: false }
                            ],
                            correctMsg: "عبقري! تعبيرات وحروف جر هامة جداً (+10)", wrongMsg: "ابحث عن العبارات التعبيرية الطويلة!"
                        }
                    ]
                }
            ]
        };

        // ==========================================
        // 🎮 تشغيل اللعبة والصوتيات
        // ==========================================
        let currentIndex = 0;
        let score = 0;
        let answered = false;

        const allQuestions = lessonData.sections[0].questions;

        document.getElementById('title').textContent = lessonData.title;
        document.getElementById('description').textContent = lessonData.description;
        document.getElementById('total-q').textContent = allQuestions.length;

        function playCorrectFX() {
            try {
                let ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc1 = ctx.createOscillator();
                let gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(523.25, ctx.currentTime);
                gain1.gain.setValueAtTime(0.2, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start();
                osc1.stop(ctx.currentTime + 0.3);

                setTimeout(() => {
                    let osc2 = ctx.createOscillator();
                    let gain2 = ctx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(659.25, ctx.currentTime);
                    gain2.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start();
                    osc2.stop(ctx.currentTime + 0.4);
                }, 100);
            } catch(e) {}
        }

        function playWrongFX() {
            try {
                let ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = ctx.createOscillator();
                let gain = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, ctx.currentTime);
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.25);
            } catch(e) {}
        }

        function loadQuestion() {
            answered = false;
            const q = allQuestions[currentIndex];
            document.getElementById('current-q').textContent = currentIndex + 1;
            document.getElementById('emoji').textContent = q.emoji;
            document.getElementById('question').textContent = q.question;
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('next-btn').style.display = 'none';

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.onclick = () => checkAnswer(opt, btn, q);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedOpt, btnElement, currentQ) {
            if (answered) return;

            if (selectedOpt.isCorrect) {
                answered = true;
                playCorrectFX();
                btnElement.classList.add('correct');
                score += 10;
                document.getElementById('score').textContent = score;
                
                const feedback = document.getElementById('feedback');
                feedback.textContent = currentQ.correctMsg;
                feedback.className = 'feedback success';

                document.getElementById('next-btn').style.display = 'inline-block';
            } else {
                playWrongFX();
                btnElement.classList.add('wrong');
                btnElement.disabled = true;
                
                const feedback = document.getElementById('feedback');
                feedback.textContent = currentQ.wrongMsg;
                feedback.className = 'feedback error';
            }
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < allQuestions.length) {
                loadQuestion();
            } else {
                document.querySelector('.question-card').innerHTML = `
                    <h2>🎉 ألف مبروك يا بطل! 🎉</h2>
                    <p style="font-size: 1.3rem;">أتممت الدرس الأول بنجاح ورصيدك النهائي: <b style="color: #f59e0b;">${score}</b> نقطة!</p>
                `;
                document.getElementById('next-btn').style.display = 'none';
            }
        }

        loadQuestion();
    </script>
</body>
</html>
