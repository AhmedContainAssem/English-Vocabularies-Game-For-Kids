<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة ألعاب اللغة الإنجليزية 🌟</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f7ff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        h1 { color: #2b6cb0; font-size: 2.2rem; }
        p { color: #4a5568; font-size: 1.2rem; margin-bottom: 30px; }
        
        /* تصميم الزرار اللي هيدخلهم على اللعبة */
        .play-btn {
            display: block;
            background: linear-gradient(135deg, #4299e1, #3182ce);
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.4rem;
            font-weight: bold;
            box-shadow: 0 6px 12px rgba(49, 130, 206, 0.3);
            transition: transform 0.2s;
        }
        .play-btn:hover {
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌟 منصة ألعاب الكلمات التفاعلية 🌟</h1>
        <p>مرحباً بكم يا أبطال! اضغطوا على الزر بالأسفل لبدء اللعب والتعلم:</p>

        <a href="unit-1/lesson-1.html" class="play-btn">
            👀👅 ابدأ لعب: الدرس الأول (Our Senses)
        </a>
    </div>

</body>
</html>
